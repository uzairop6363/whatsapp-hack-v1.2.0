<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>WhatsApp Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root{--red:#ff003c;--gold:#ffee00;--slate:#1e293b;--dark:#020617}
        body{background:var(--dark);color:#fff;font-family:sans-serif;height:100dvh;overflow:hidden;margin:0;display:flex;justify-content:center;align-items:center}

        /* AMBIENT BG GLOW */
        .glow-bg {position:fixed;inset:-50%;background:radial-gradient(circle at 20% 30%, rgba(255,0,60,0.2) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(255,238,0,0.1) 0%, transparent 40%);filter:blur(100px);z-index:-1;animation:pulseBg 12s infinite alternate}
        @keyframes pulseBg { 0%{transform:rotate(0deg) scale(1)} 100%{transform:rotate(10deg) scale(1.1)} }

        /* NEON BORDER MORPH */
        @keyframes borderMorph { 0%{border-color:var(--red);box-shadow:0 0 20px rgba(255,0,60,0.3)} 50%{border-color:var(--gold);box-shadow:0 0 20px rgba(255,238,0,0.3)} 100%{border-color:var(--red);box-shadow:0 0 20px rgba(255,0,60,0.3)} }

        /* ERROR TOAST */
        #error-popup {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            background: rgba(255, 0, 60, 0.95);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            border: 2px solid var(--gold);
            font-weight: 900;
            text-transform: uppercase;
            z-index: 9999;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 0 30px rgba(255,0,60,0.8);
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }
        #error-popup.show { transform: translateX(-50%) translateY(0px); opacity: 1; pointer-events: auto; }

        /* GLOBAL LOADER */
        #global-loader{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;display:none;flex-direction:column;justify-content:center;align-items:center;backdrop-filter:blur(15px)}
        .mini-spinner{width:60px;height:60px;border:4px solid transparent;border-top-color:var(--red);border-bottom-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* PAGE STRUCTURE */
        .page{display:none;width:94%;max-width:440px;height:90dvh;position:relative;flex-direction:column}
        .active{display:flex!important;animation:fadeIn 0.3s ease-out}
        @keyframes fadeIn{from{opacity:0;transform:scale(0.98)}to{opacity:1;transform:scale(1)}}

        /* UI COMPONENTS */
        .card-main{background:rgba(15,23,42,0.9);border:3px solid;border-radius:25px;padding:25px;flex:1;display:flex;flex-direction:column;backdrop-filter:blur(20px);animation:borderMorph 6s infinite linear}
        
        .n-input{
            background:rgba(255,255,255,0.05);
            border:2px solid var(--gold);
            padding:18px;
            border-radius:12px;
            color:#fff;
            font-size:18px;
            margin-bottom:15px;
            outline:none;
            text-align:center;
            font-weight:800;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .n-input:focus {
            background:rgba(255,255,255,0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 10px rgba(255,238,0,0.3);
            border-color: #fff;
        }

        .n-btn{background:var(--red);color:#fff;padding:20px;border-radius:15px;font-weight:900;text-transform:uppercase;cursor:pointer;border:1px solid var(--gold);box-shadow:0 0 30px rgba(255,0,60,0.4);font-size:16px;transition: 0.2s;}
        .n-btn:active { transform: scale(0.96); }

        /* SCANNER */
        .circle{width:160px;height:160px;border:6px dashed var(--gold);border-radius:50%;animation:spin 4s linear infinite;display:flex;justify-content:center;align-items:center}
        #ptext{font-size:40px;font-weight:900;color:var(--gold)}

        /* LOGO */
        .prof-logo { width: 90px; height: 90px; margin: 0 auto 20px; position: relative; }
        .prof-logo-inner { width: 100%; height: 100%; border-radius: 50%; background: var(--dark); border: 4px solid var(--gold); display: flex; justify-content: center; align-items: center; position: relative; z-index: 1; box-shadow: 0 0 15px rgba(255,238,0,0.5); animation: float-logo 4s infinite ease-in-out; }
        .prof-logo-inner span { font-size: 36px; font-weight: 900; color: var(--gold); }
        @keyframes float-logo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* CHAT EXPORT DESIGN */
        .chat-header{background:rgba(255,255,255,0.05);padding:15px 20px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;align-items:center}
        .chat-scr{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;background:#050505;border-radius:0 0 25px 25px}
        .date-divider{text-align:center;margin:20px 0;position:relative}
        .date-divider span{background:#1e293b;padding:4px 15px;border-radius:10px;font-size:11px;font-weight:900;color:var(--gold);text-transform:uppercase}
        .bubble{padding:12px 15px;border-radius:12px;max-width:85%;position:relative}
        .b-left{background:#262626;color:#fff;align-self:flex-start;border-left:4px solid var(--gold)}
        .b-right{background:#8b0000;color:#fff;align-self:flex-end;border-right:4px solid var(--red)}
        .msg-text{font-size:15px;font-weight:600;display:block;margin-bottom:4px;line-height:1.3}
        .msg-time{font-size:9px;color:rgba(255,255,255,0.5);display:block;text-align:right;font-weight:bold}

        .footer-pro{position:fixed;bottom:0;width:100%;padding:10px;text-align:center;font-size:12px;font-weight:900;color:var(--gold);background:#000;z-index:100;border-top:1px solid var(--red)}
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div id="error-popup"><span>⚠️ ACCESS DENIED</span></div>

    <div id="global-loader">
        <div class="mini-spinner"></div>
        <p class="mt-6 text-red-500 font-bold tracking-[3px] text-xs animate-pulse uppercase">Syncing Data...</p>
    </div>

    <div id="p1" class="page active">
        <div class="card-main">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-black text-white italic">WhatsApp Tool</h1>
                <p class="text-xs text-gold tracking-[5px] font-bold uppercase">Dev: C9 UZAIR</p>
            </div>
            <input type="text" id="t1" placeholder="TARGET NUMBER" class="n-input">
            <input type="text" id="t2" placeholder="VICTIM ID" class="n-input">
            <button onclick="triggerLoad(2)" class="n-btn mt-4">Connect Server</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="card-main items-center justify-center">
            <div class="circle"><div id="ptext">0%</div></div>
            <p class="mt-10 text-gold font-bold tracking-widest animate-pulse uppercase text-center">Fetching Archive...</p>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="card-main">
            <h2 class="text-2xl font-black text-gold mb-6 uppercase text-center">Enter RSA Key</h2>
            <textarea id="rsa" class="n-input h-52 w-full text-[10px] font-mono leading-tight" placeholder="PASTE RSA BLOCK"></textarea>
            <button onclick="triggerLoad(4)" class="n-btn mt-auto">Verify Protocol</button>
        </div>
    </div>

    <div id="p4" class="page">
        <div class="card-main justify-center text-center">
            <div class="prof-logo"><div class="prof-logo-inner"><span>C9</span></div></div>
            <h2 class="text-xl font-black text-red-600 mb-6 uppercase leading-tight">
                Please Enter Private Key <br> 
                <span class="text-white text-base">Or Buy It From</span> <br>
                <span class="text-gold">C9 UZAIR 03221287976</span>
            </h2>
            <input type="password" id="vip" placeholder="Private KEY" class="n-input">
            <button onclick="triggerLoad(5)" class="n-btn">Unlock Chats</button>
        </div>
    </div>

    <div id="p5" class="page">
        <div class="card-main p-0 overflow-hidden">
            <div class="chat-header">
                <span class="text-sm font-black text-white uppercase tracking-widest">Chats Hacked ✅</span>
                <span class="text-[10px] text-red-500 font-bold animate-pulse">● LIVE</span>
            </div>
            <div class="chat-scr" id="chat"></div>
            <div class="p-3 bg-black text-center">
                <button onclick="location.reload()" class="text-[10px] font-bold text-gray-500 uppercase">Exit Session</button>
            </div>
        </div>
    </div>

    <div class="footer-pro">C9 UZAIR // WHATSAPP 0 3 2 2 1 2 8 7 9 7 6</div>

    <script>
        const _K = "c9uzair-whatsapp-hack-key-SkQwueMepfNAFDkwn";
        const _RSA = "-----BEGIN RSA PRIVATE KEY-----\nProc-Type: 4,ENCRYPTED\nDEK-Info: AES-128-CBC,5351515254425445\n\nC9-UZAIR-MASTER-AUTH-ENCRYPTION-KEY-2026\nXyZ789-VpS-Node-Singapore-01x-AUTH\nFk92NjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5v\ncHFyc3R1dnd4eXowMTIzNDU2Nzg5MGFiY2Rl\nZmdoaWp r bW5vcHFyc3R1dnd4eXowMTIzNDU2\nNzg5MGFiY2RlZmdoaWp r bW5vcHFyc3R1dnd4\neXowMTIzNDU2Nzg5MGFiY2RlZmdoaWp r bW5v\n-----END RSA PRIVATE KEY-----";

        function showError(msg) {
            const popup = document.getElementById('error-popup');
            if(msg) popup.querySelector('span').innerText = msg;
            popup.classList.add('show');
            setTimeout(() => { popup.classList.remove('show'); }, 3000);
        }

        function triggerLoad(next) {
            if(next === 4 && document.getElementById('rsa').value.trim() !== _RSA.trim()) { showError("⚠️ INVALID RSA SIGNATURE"); return; }
            if(next === 5 && document.getElementById('vip').value !== _K) { showError("⚠️ WRONG PRIVATE KEY"); return; }
            if(next === 2 && !document.getElementById('t1').value) return;

            const loader = document.getElementById('global-loader');
            loader.style.display = 'flex';
            setTimeout(() => {
                loader.style.display = 'none';
                nav(next);
                if(next === 2) startScan();
            }, 1800);
        }

        function nav(s) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p'+s).classList.add('active');
            if(s === 5) loadArchive();
        }

        function startScan() {
            let p = 0;
            const intv = setInterval(() => {
                if(p < 100) { p += 5; document.getElementById('ptext').innerText = p + "%"; }
                else { clearInterval(intv); setTimeout(() => triggerLoad(3), 800); }
            }, 100);
        }

        function loadArchive() {
            const chatBox = document.getElementById('chat');
            const history = [
                {type:'date', text:'Monday, March 23'},
                {side:'left', text:'Suna bhae kahan ho?', time:'11:20 AM'},
                {side:'right', text:'Office mein hon kaam kar raha hon.', time:'11:22 AM'},
                {side:'left', text:'Shaam ko milo ge phir?', time:'11:25 AM'},
                {type:'date', text:'Yesterday'},
                {side:'right', text:'Bhae wo files check kar li hain?', time:'09:10 PM'},
                {side:'left', text:'Nahi abhi ghar aya hon thori der mein dekhta hon.', time:'09:15 PM'},
                {type:'date', text:'Today'},
                {side:'left', text:'Assalam-o-Alaikum bhae.', time:'10:05 AM'},
                {side:'right', text:'Walaikum Assalam, kaise ho?', time:'10:10 AM'},
                {side:'right', text:'Aaj thora busy hon, kal milte hain.', time:'10:15 AM'}
            ];

            history.forEach((item, i) => {
                setTimeout(() => {
                    if(item.type === 'date') {
                        const div = document.createElement('div');
                        div.className = 'date-divider';
                        div.innerHTML = `<span>${item.text}</span>`;
                        chatBox.appendChild(div);
                    } else {
                        const b = document.createElement('div');
                        b.className = `bubble ${item.side === 'left' ? 'b-left' : 'b-right'}`;
                        b.innerHTML = `<span class="msg-text">${item.text}</span><span class="msg-time">${item.time}</span>`;
                        chatBox.appendChild(b);
                    }
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, i * 600);
            });
        }
    </script>
</body>
</html>
